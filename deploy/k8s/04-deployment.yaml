apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentpulse
  namespace: agentpulse
  labels:
    app: agentpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentpulse
  template:
    metadata:
      labels:
        app: agentpulse
    spec:
      containers:
      - name: agentpulse
        image: ghcr.io/YOUR_ORG/agentpulse:latest  # Replace with your registry
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: TZ
          value: "America/New_York"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentpulse-secrets
              key: DATABASE_URL
        - name: AGENTPULSE_INITIAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentpulse-secrets
              key: AGENTPULSE_INITIAL_API_KEY
        envFrom:
        - configMapRef:
            name: agentpulse-config
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          # Default timeoutSeconds is 1, which is too tight when the
          # event loop is briefly saturated during LLM streaming.
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          # Same reasoning as readinessProbe; failureThreshold=5 lets
          # several consecutive slow probes pass before SIGKILL.
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: agentpulse-data
