apiVersion: v1
kind: Secret
metadata:
  name: agentpulse-secrets
  namespace: agentpulse
  labels:
    app: agentpulse
type: Opaque
stringData:
  # PostgreSQL connection on postgres-01.xmojo.net
  # Create the database first:
  #   psql -h postgres-01.xmojo.net -U psadmin -c "CREATE USER agentpulse WITH PASSWORD '<password>';"
  #   psql -h postgres-01.xmojo.net -U psadmin -c "CREATE DATABASE agentpulse OWNER agentpulse ENCODING 'UTF8' LC_COLLATE 'C' LC_CTYPE 'C' TEMPLATE template0;"
  DATABASE_URL: "postgresql://agentpulse:<PASSWORD>@postgres-01.xmojo.net:5432/agentpulse"

  # Initial API key for hook authentication (optional - auto-generated on first start if empty)
  AGENTPULSE_INITIAL_API_KEY: ""
