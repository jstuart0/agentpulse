apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agentpulse-https
  namespace: agentpulse
spec:
  entryPoints:
    - websecure
  routes:
    # All API routes bypass Authentik - they use API key auth instead
    # This covers hooks, sessions, settings, WebSocket, health
    - match: Host(`agentpulse.xmojo.net`) && PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    # Setup scripts - public
    - match: Host(`agentpulse.xmojo.net`) && Path(`/setup.sh`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.xmojo.net`) && Path(`/setup-relay.sh`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    # Dashboard frontend - Authentik protected
    - match: Host(`agentpulse.xmojo.net`)
      kind: Rule
      middlewares:
        - name: agentpulse-forwardauth
      services:
        - name: agentpulse
          port: 3000
  tls:
    secretName: wildcard-xmojo-net-production-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agentpulse-http
  namespace: agentpulse
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`agentpulse.xmojo.net`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000
      middlewares:
        - name: https-redirect
          namespace: agentpulse
