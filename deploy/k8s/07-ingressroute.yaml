apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agentpulse-https
  namespace: agentpulse
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`agentpulse.example.com`) && Path(`/api/v1/health`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && Path(`/api/v1/hooks`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && Path(`/api/v1/hooks/status`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && PathPrefix(`/api/v1/supervisors`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    # Setup scripts - public
    - match: Host(`agentpulse.example.com`) && Path(`/setup.sh`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && Path(`/setup-relay.sh`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && Path(`/install-local.sh`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    - match: Host(`agentpulse.example.com`) && Path(`/install-local.ps1`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000

    # Dashboard frontend - Authentik protected
    - match: Host(`agentpulse.example.com`)
      kind: Rule
      middlewares:
        - name: agentpulse-forwardauth
      services:
        - name: agentpulse
          port: 3000
  tls:
    secretName: wildcard-xmojo-net-production-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agentpulse-http
  namespace: agentpulse
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`agentpulse.example.com`)
      kind: Rule
      services:
        - name: agentpulse
          port: 3000
      middlewares:
        - name: https-redirect
          namespace: agentpulse
