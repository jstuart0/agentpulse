<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>AgentPulse</title>
	<meta name="description" content="Command center for AI coding agents across all your machines." />
	<meta property="og:title" content="AgentPulse" />
	<meta property="og:description" content="Command center for AI coding agents across all your machines." />
	<meta property="og:image" content="/assets/agentpulse-social.jpg" />
	<meta property="og:type" content="website" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="AgentPulse" />
	<meta name="twitter:description" content="Command center for AI coding agents across all your machines." />
	<meta name="twitter:image" content="/assets/agentpulse-social.jpg" />
	<link rel="icon" type="image/svg+xml" href="/assets/agentpulse-icon.svg" />
	<link rel="apple-touch-icon" href="/assets/agentpulse-social.jpg" />
	<script>
		(() => {
			try {
				const stored = localStorage.getItem("agentpulse-theme");
				const theme = stored === "light" || stored === "dark"
					? stored
					: (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
				document.documentElement.classList.toggle("dark", theme === "dark");
				document.documentElement.dataset.theme = theme;
			} catch {
				document.documentElement.classList.add("dark");
				document.documentElement.dataset.theme = "dark";
			}
		})();
	</script>
</head>
<body class="bg-background text-foreground">
	<div id="root"></div>
	<script type="module" src="./main.tsx"></script>
</body>
</html>
