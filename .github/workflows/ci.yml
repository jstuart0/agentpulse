name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Architecture and installer guards
        run: bun run check:architecture

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bunx vite build

      - name: Build server
        run: bun run build:server

  windows-installers:
    name: Windows Installer Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "scripts/install-local.ps1"), [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Verify installer route and ingress references
        shell: pwsh
        run: |
          $setup = Get-Content src/server/routes/setup.ts -Raw
          if ($setup -notmatch 'install-local\.ps1') { throw "setup.ts does not expose install-local.ps1" }
          $ingress = Get-Content deploy/k8s/07-ingressroute.yaml -Raw
          if ($ingress -notmatch 'install-local\.ps1') { throw "ingress route does not expose install-local.ps1" }

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, windows-installers]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentpulse:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
